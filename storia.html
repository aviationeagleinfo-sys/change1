<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Storia del Change | Hub Operativo Pro</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-main: #395296;        
            --titles-gold: #f8c200;    
            --accent-coral: #eb966a;   
            --text-light: #d6dcea;     
            --dark-overlay: rgba(0, 0, 0, 0.2);
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            transition: padding-top 0.3s;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Outfit', sans-serif;
            color: var(--titles-gold);
            font-weight: 700;
        }

        /* === TOOLBAR ADMIN POTENZIATA === */
        #admin-toolbar {
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(15, 25, 50, 0.98);
            padding: 10px; z-index: 10000; 
            border-bottom: 3px solid var(--titles-gold);
            display: none; 
            gap: 10px; 
            overflow-x: auto;
            white-space: nowrap;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        body.editor-on { padding-top: 100px !important; }

        .toolbar-group {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toolbar-label { font-size: 0.65rem; text-transform: uppercase; color: var(--titles-gold); margin-right: 5px; font-weight: bold; }

        .toolbar-btn {
            background: var(--dark-overlay); color: var(--white); border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
            transition: 0.2s;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--titles-gold); }

        /* === LAYOUT DINAMICO CARD === */
        #dynamic-content-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: stretch;
        }

        .epoch-card { 
            flex: 1 1 100%; /* Default 100% */
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 18px; 
            border-left: 5px solid var(--accent-coral); 
            transition: transform 0.2s, box-shadow 0.2s;
            word-wrap: break-word;
            position: relative;
            min-width: 300px;
        }

        /* Se la card è impostata a 50% */
        .epoch-card.half-width {
            flex: 1 1 calc(50% - 10px);
        }

        /* Evidenziazione card attiva */
        .epoch-card.selected-for-edit {
            outline: 2px solid var(--titles-gold);
            background: rgba(255,255,255,0.08);
        }

        .epoch-card img { max-width: 100%; height: auto; border-radius: 12px; margin: 15px 0; }
        .epoch-card.borderless { background: transparent!important; border-left: none!important; padding-left: 0; }

        /* === NAVBAR & OVERLAYS === */
        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .navbar { background: rgba(42, 61, 114, 0.95); border-bottom: 4px solid var(--accent-coral); backdrop-filter: blur(10px); }
        .card-action-btn { display: inline-block; padding: 8px 15px; background: var(--accent-coral); color: white!important; text-decoration: none!important; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="login-box text-center bg-dark p-5 rounded-4 border border-warning shadow-lg w-100" style="max-width: 400px;">
            <h4 class="mb-4 text-warning"><i class="bi bi-shield-lock"></i> Admin Access</h4>
            <div id="step-pass">
                <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password...">
            </div>
            <div id="step-otp" style="display:none;">
                <input type="text" id="otp-code" class="form-control mb-3 text-center fs-4" placeholder="000000" maxlength="6">
            </div>
            <button id="btn-unlock-action" onclick="handleSecurityFlow()" class="btn btn-warning w-100 fw-bold mb-2">ENTRA</button>
            <button onclick="closePasswordPrompt()" class="btn btn-link text-white btn-sm">Annulla</button>
        </div>
    </div>

    <div id="admin-toolbar">
        <div class="toolbar-group">
            <span class="toolbar-label">Editor</span>
            <button class="toolbar-btn" onclick="formatText('bold')"><i class="bi bi-type-bold"></i></button>
            <button class="toolbar-btn" onclick="formatText('italic')"><i class="bi bi-type-italic"></i></button>
            <button class="toolbar-btn" onclick="addImageUrl()" title="Inserisci Immagine"><i class="bi bi-image"></i></button>
        </div>

        <div class="toolbar-group">
            <span class="toolbar-label">Posizione</span>
            <button class="toolbar-btn" onclick="moveBlock('up')"><i class="bi bi-arrow-up-circle"></i></button>
            <button class="toolbar-btn" onclick="moveBlock('down')"><i class="bi bi-arrow-down-circle"></i></button>
        </div>

        <div class="toolbar-group">
            <span class="toolbar-label">Layout</span>
            <button class="toolbar-btn" onclick="toggleBlockSize()" title="Espandi/Contrai (50/100%)"><i class="bi bi-arrows-angle-expand"></i></button>
            <button class="toolbar-btn" onclick="toggleBorderless()"><i class="bi bi-border-style"></i></button>
            <input type="color" title="Sfondo" onchange="setCardStyle('bg', this.value)" style="width:25px; height:25px;">
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn bg-success border-0" onclick="addNewCard()"><i class="bi bi-plus-lg"></i></button>
            <button class="toolbar-btn bg-danger border-0" onclick="deleteSelectedCard()"><i class="bi bi-trash"></i></button>
            <button class="toolbar-btn bg-primary border-0 fw-bold" id="btn-save" onclick="saveToFirebase()">SALVA</button>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="media/changelogoclear.png" alt="Logo" width="45" class="me-2">
                <span class="text-white">GIUSEPPE<span style="color:var(--titles-gold)">MUSUMECI</span></span>
            </a>
            <div id="user-info" style="display:none;">
                <button onclick="logout()" class="btn btn-outline-light btn-sm">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div id="dynamic-content-area">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-warning"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            databaseURL: "https://giuseppe-4c318-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const ADMIN_EMAILS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com', 'drgiuseppemusumeci@gmail.com'];
        const OBFUSCATED_PASS = "TWFzY2FsaTE5NzEh"; 
        const TOTP_SECRET = "JBSWY3DPEHPK3PXP"; 

        let isAdminActive = false;
        let loginStep = 1;
        let activeCard = null;

        auth.onAuthStateChanged(user => {
            if (user && ADMIN_EMAILS.includes(user.email.toLowerCase())) {
                document.getElementById('user-info').style.display = 'block';
                if (!isAdminActive) document.getElementById('password-overlay').style.display = 'flex';
            }
            loadRealtimeData();
        });

        // Security Logic
        window.handleSecurityFlow = () => {
            if (loginStep === 1) {
                if (btoa(document.getElementById("system-password").value) === OBFUSCATED_PASS) {
                    loginStep = 2;
                    document.getElementById('step-pass').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                } else { alert("Accesso negato."); }
            } else {
                let totp = new OTPAuth.TOTP({ secret: TOTP_SECRET });
                if (totp.validate({ token: document.getElementById("otp-code").value.trim(), window: 1 }) !== null) {
                    unlockEditor();
                } else { alert("Codice errato."); }
            }
        };

        function unlockEditor() {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('admin-toolbar').style.display = 'flex';
            document.body.classList.add('editor-on');
            isAdminActive = true;
            loadRealtimeData();
        }

        // --- FUNZIONI TOOLBAR MODIFICATE ---

        window.formatText = (cmd, val = null) => document.execCommand(cmd, false, val);

        window.addImageUrl = () => {
            const url = prompt("Incolla l'URL dell'immagine:");
            if(url) formatText('insertHTML', `<img src="${url}" class="img-fluid">`);
        };

        window.toggleBlockSize = () => {
            if(!activeCard) return alert("Seleziona una card!");
            activeCard.classList.toggle('half-width');
        };

        window.moveBlock = (dir) => {
            if(!activeCard) return alert("Seleziona una card!");
            const container = document.getElementById('dynamic-content-area');
            if(dir === 'up' && activeCard.previousElementSibling) {
                container.insertBefore(activeCard, activeCard.previousElementSibling);
            } else if(dir === 'down' && activeCard.nextElementSibling) {
                container.insertBefore(activeCard.nextElementSibling, activeCard);
            }
        };

        // --- GESTIONE DATI ---

        function loadRealtimeData() {
            db.ref('system_pages/storia_change').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('dynamic-content-area');
                container.innerHTML = '';
                if (data) {
                    Object.values(data).forEach((item) => {
                        const card = document.createElement('div');
                        card.className = `epoch-card ${item.isHalf ? 'half-width' : ''} ${item.isBorderless ? 'borderless' : ''}`;
                        card.style.backgroundColor = item.bgColor || '';
                        card.style.borderLeftColor = item.borderColor || '';
                        card.innerHTML = item.html || '';
                        if (isAdminActive) {
                            card.setAttribute('contenteditable', 'true');
                            card.onclick = (e) => { 
                                document.querySelectorAll('.epoch-card').forEach(c => c.classList.remove('selected-for-edit'));
                                activeCard = card; 
                                card.classList.add('selected-for-edit');
                                e.stopPropagation(); 
                            };
                        }
                        container.appendChild(card);
                    });
                }
                document.getElementById('loading-spinner')?.remove();
            });
        }

        window.addNewCard = () => {
            const card = document.createElement('div');
            card.className = 'epoch-card';
            card.setAttribute('contenteditable', 'true');
            card.innerHTML = "<h3>Nuovo Titolo</h3><p>Scrivi qui...</p>";
            card.onclick = (e) => { 
                document.querySelectorAll('.epoch-card').forEach(c => c.classList.remove('selected-for-edit'));
                activeCard = card; 
                card.classList.add('selected-for-edit');
                e.stopPropagation(); 
            };
            document.getElementById('dynamic-content-area').prepend(card);
        };

        window.saveToFirebase = () => {
            const btn = document.getElementById('btn-save'); btn.innerText = "SALVATAGGIO...";
            const data = Array.from(document.querySelectorAll('.epoch-card')).map(card => ({
                html: card.innerHTML,
                bgColor: card.style.backgroundColor,
                borderColor: card.style.borderLeftColor,
                isBorderless: card.classList.contains('borderless'),
                isHalf: card.classList.contains('half-width')
            }));
            db.ref('system_pages/storia_change').set(data).then(() => {
                btn.innerText = "SALVATO!";
                setTimeout(() => btn.innerText = "SALVA", 2000);
            });
        };

        window.setCardStyle = (type, val) => {
            if(!activeCard) return alert("Seleziona una card!");
            if(type === 'bg') activeCard.style.backgroundColor = val;
        };

        window.toggleBorderless = () => { if(activeCard) activeCard.classList.toggle('borderless'); };
        window.deleteSelectedCard = () => { if(activeCard && confirm("Eliminare questo blocco?")) activeCard.remove(); };
        window.closePasswordPrompt = () => document.getElementById('password-overlay').style.display = 'none';
        window.logout = () => auth.signOut().then(() => window.location.reload());

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.epoch-card') && !e.target.closest('#admin-toolbar')) {
                document.querySelectorAll('.epoch-card').forEach(c => c.classList.remove('selected-for-edit'));
                activeCard = null;
            }
        });
    </script>
</body>
</html>
