<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storia del Change | Hub Operativo Pro</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-main: #395296;        
            --titles-gold: #f8c200;    
            --accent-coral: #eb966a;   
            --text-light: #d6dcea;     
            --dark-overlay: rgba(0, 0, 0, 0.2);
            --column-base: rgba(214, 220, 234, 0.1); 
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            transition: padding-top 0.3s;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Outfit', sans-serif;
            color: var(--titles-gold);
            font-weight: 700;
        }

        /* === TOOLBAR ADMIN === */
        #admin-toolbar {
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(15, 25, 50, 0.98);
            padding: 10px; z-index: 10000; 
            border-bottom: 3px solid var(--titles-gold);
            display: none; 
            gap: 10px; 
            overflow-x: auto;
            white-space: nowrap;
            justify-content: flex-start;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        body.editor-on { padding-top: 140px !important; }

        .toolbar-group {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toolbar-label { font-size: 0.65rem; text-transform: uppercase; color: var(--titles-gold); font-weight: bold; }

        .toolbar-btn {
            background: var(--dark-overlay); color: var(--white); border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
        }

        /* === CARDS === */
        .epoch-card { 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            border-radius: 18px; 
            border-left: 5px solid var(--accent-coral); 
            margin-bottom: 20px; 
            position: relative;
        }
        .epoch-card.borderless { background: transparent!important; border-left: none!important; }

        /* === OVERLAY LOGIN 3 LIVELLI === */
        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .teal-divider { width: 50px; height: 4px; background: var(--accent-coral); margin: 20px 0; border-radius: 10px; }
        
        .navbar { 
            background: rgba(42, 61, 114, 0.95); 
            border-bottom: 4px solid var(--accent-coral); 
            backdrop-filter: blur(10px);
        }
        .btn-medical { background-color: var(--accent-coral); color: white; border-radius: 50px; padding: 8px 20px; font-weight: 700; border: none; }
        .card-action-btn { display: inline-block; padding: 8px 15px; background: var(--accent-coral); color: white!important; border-radius: 5px; font-weight: bold; margin-top: 10px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="login-box text-center bg-dark p-4 p-md-5 rounded-4 border border-warning shadow-lg w-100" style="max-width: 400px;">
            <h4 class="mb-4 text-warning"><i class="bi bi-shield-lock"></i> Security Check</h4>
            
            <div id="step-pass">
                <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password di sistema...">
            </div>

            <div id="step-otp" style="display:none;">
                <p class="text-white-50 small mb-2">Inserisci il codice temporaneo dall'App</p>
                <input type="text" id="otp-code" class="form-control mb-3 text-center fs-4" placeholder="000 000" maxlength="6" style="letter-spacing: 5px;">
            </div>

            <button id="btn-unlock-action" onclick="handleSecurityFlow()" class="btn btn-warning w-100 fw-bold mb-2">PROSEGUI</button>
            <button onclick="closePasswordPrompt()" class="btn btn-link text-white btn-sm">Annulla</button>
        </div>
    </div>

    <div id="admin-toolbar">
        <div class="toolbar-group">
            <span class="toolbar-label">Testo</span>
            <button class="toolbar-btn" onclick="formatText('bold')"><i class="bi bi-type-bold"></i></button>
            <button class="toolbar-btn" onclick="formatText('italic')"><i class="bi bi-type-italic"></i></button>
            <button class="toolbar-btn" onclick="formatText('formatBlock', 'blockquote')"><i class="bi bi-quote"></i></button>
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">Azioni</span>
            <button class="toolbar-btn bg-success border-0" onclick="addNewCard()"><i class="bi bi-plus-lg"></i></button>
            <button class="toolbar-btn bg-danger border-0" onclick="deleteSelectedCard()"><i class="bi bi-trash"></i></button>
            <button class="toolbar-btn bg-primary border-0" id="btn-save" onclick="saveToFirebase()"><i class="bi bi-cloud-arrow-up"></i> SALVA</button>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="media/changelogoclear.png" alt="Logo" width="55" class="me-2">
                <span class="text-white">GIUSEPPE<span style="color:var(--titles-gold)">MUSUMECI</span></span>
            </a>
            <div id="user-info" style="display:none; align-items:center;">
                <span id="user-name" class="small fw-bold text-warning me-3"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div id="dynamic-content-area">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-warning"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>

    <script>
        // CONFIGURAZIONE
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            databaseURL: "https://giuseppe-4c318-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const ADMIN_EMAILS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com', 'drgiuseppemusumeci@gmail.com'];
        const OBFUSCATED_PASS = "TWFzY2FsaTE5NzEh"; // Password Mascali...
        const TOTP_SECRET = "JBSWY3DPEHPK3PXP"; // Inserisci questa chiave nell'app Authenticator

        let isAdminActive = false;
        let loginStep = 1;

        // Gestione Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email.toLowerCase();
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').innerText = email.split('@')[0];
                if (ADMIN_EMAILS.includes(email) && !isAdminActive) {
                    document.getElementById('password-overlay').style.display = 'flex';
                }
            }
            loadRealtimeData();
        });

        // FLUSSO DI SICUREZZA (Pass -> OTP)
        window.handleSecurityFlow = () => {
            if (loginStep === 1) {
                const pass = document.getElementById("system-password").value;
                if (btoa(pass) === OBFUSCATED_PASS) {
                    loginStep = 2;
                    document.getElementById('step-pass').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                    document.getElementById('btn-unlock-action').innerText = "VERIFICA CODICE";
                } else {
                    alert("Password Errata");
                }
            } else if (loginStep === 2) {
                const code = document.getElementById("otp-code").value.trim();
                
                // Logica TOTP
                let totp = new OTPAuth.TOTP({
                    issuer: "Hub",
                    label: "Admin",
                    algorithm: "SHA1",
                    digits: 6,
                    period: 30,
                    secret: TOTP_SECRET
                });

                let isValid = totp.validate({ token: code, window: 1 }); // finestra di tolleranza 1 (30s prima/dopo)

                if (isValid !== null) {
                    unlockEditor();
                } else {
                    alert("Codice errato o scaduto. Riprova.");
                }
            }
        };

        function unlockEditor() {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('admin-toolbar').style.display = 'flex';
            document.body.classList.add('editor-on');
            isAdminActive = true;
            loadRealtimeData();
        }

        // Funzioni Database
        function loadRealtimeData() {
            db.ref('system_pages/storia_change').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('dynamic-content-area');
                container.innerHTML = '';
                if (data) {
                    const items = Array.isArray(data) ? data : Object.values(data);
                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'epoch-card ' + (item.isBorderless ? 'borderless' : '');
                        card.style.backgroundColor = item.bgColor || '';
                        card.style.borderLeftColor = item.borderColor || '';
                        card.innerHTML = item.html || '';
                        if (isAdminActive) {
                            card.setAttribute('contenteditable', 'true');
                            card.onclick = () => { activeCard = card; };
                        }
                        container.appendChild(card);
                    });
                }
                document.getElementById('loading-spinner')?.remove();
            });
        }

        window.saveToFirebase = () => {
            const btn = document.getElementById('btn-save');
            btn.innerHTML = 'SALVATAGGIO...';
            const data = Array.from(document.querySelectorAll('.epoch-card')).map((card, idx) => ({
                id: idx,
                html: card.innerHTML,
                bgColor: card.style.backgroundColor,
                borderColor: card.style.borderLeftColor,
                isBorderless: card.classList.contains('borderless')
            }));
            db.ref('system_pages/storia_change').set(data)
                .then(() => { btn.innerText = "SALVATO!"; setTimeout(() => btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> SALVA', 2000); })
                .catch(err => alert("Errore: " + err.message));
        };

        window.formatText = (cmd, val = null) => document.execCommand(cmd, false, val);
        window.closePasswordPrompt = () => document.getElementById('password-overlay').style.display = 'none';
        window.logout = () => auth.signOut().then(() => window.location.reload());
    </script>
</body>
</html>
