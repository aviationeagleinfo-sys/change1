<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Storia del Change | Hub Operativo Pro</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-main: #395296;        
            --titles-gold: #f8c200;    
            --accent-coral: #eb966a;   
            --text-light: #d6dcea;     
            --dark-overlay: rgba(0, 0, 0, 0.2);
            --column-base: rgba(214, 220, 234, 0.1); 
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            transition: padding-top 0.3s;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Outfit', sans-serif;
            color: var(--titles-gold);
            font-weight: 700;
        }

        /* === TOOLBAR ADMIN ORIGINALE === */
        #admin-toolbar {
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(15, 25, 50, 0.98);
            padding: 10px; z-index: 10000; 
            border-bottom: 3px solid var(--titles-gold);
            display: none; 
            gap: 10px; 
            overflow-x: auto;
            white-space: nowrap;
            justify-content: flex-start;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        #admin-toolbar::-webkit-scrollbar { height: 4px; }
        #admin-toolbar::-webkit-scrollbar-thumb { background: var(--titles-gold); }

        body.editor-on { padding-top: 140px !important; }

        .toolbar-group {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toolbar-label { font-size: 0.65rem; text-transform: uppercase; color: var(--titles-gold); margin-right: 5px; font-weight: bold; }

        .toolbar-btn {
            background: var(--dark-overlay); color: var(--white); border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); }

        /* === CARDS & LAYOUT DINAMICO === */
        #dynamic-content-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Spazio tra i blocchi */
        }

        .epoch-card { 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            border-radius: 18px; 
            border-left: 5px solid var(--accent-coral); 
            margin-bottom: 0px; /* Gestito dal gap del flex */
            transition: 0.3s;
            word-wrap: break-word;
            position: relative;
            flex: 1 1 100%; /* Default: occupa tutto lo spazio */
            box-sizing: border-box;
        }

        /* Classe per blocchi ridotti (50%) */
        .epoch-card.half-size {
            flex: 1 1 calc(50% - 10px);
        }

        .epoch-card img { max-width: 100%; height: auto; border-radius: 10px; }
        
        .epoch-card.borderless { background: transparent!important; border-left: none!important; padding-left: 0; }
        .epoch-card[contenteditable="true"]:focus { outline: 2px dashed var(--titles-gold); background: rgba(255,255,255,0.07); }

        /* === OVERLAY LOGIN === */
        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .teal-divider { width: 50px; height: 4px; background: var(--accent-coral); margin: 20px 0; border-radius: 10px; }
        
        .navbar { 
            background: rgba(42, 61, 114, 0.95); 
            border-bottom: 4px solid var(--accent-coral); 
            padding: 1rem 0; 
            backdrop-filter: blur(10px);
        }
        .btn-medical { background-color: var(--accent-coral); color: white; border-radius: 50px; padding: 8px 20px; font-weight: 700; border: none; transition: 0.3s; }
        .card-action-btn { display: inline-block; padding: 8px 15px; background: var(--accent-coral); color: white!important; text-decoration: none!important; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="login-box text-center bg-dark p-4 p-md-5 rounded-4 border border-warning shadow-lg w-100" style="max-width: 400px;">
            <h4 class="mb-4 text-warning"><i class="bi bi-shield-lock"></i> Security Check</h4>
            
            <div id="step-pass">
                <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password di sistema...">
            </div>

            <div id="step-otp" style="display:none;">
                <p class="text-white-50 small mb-2">Inserisci codice Authenticator</p>
                <input type="text" id="otp-code" class="form-control mb-3 text-center fs-4" placeholder="000000" maxlength="6">
            </div>

            <button id="btn-unlock-action" onclick="handleSecurityFlow()" class="btn btn-warning w-100 fw-bold mb-2">PROSEGUI</button>
            <button onclick="closePasswordPrompt()" class="btn btn-link text-white btn-sm">Sola Lettura</button>
        </div>
    </div>

    <div id="admin-toolbar">
        <div class="toolbar-group">
            <span class="toolbar-label">Testo</span>
            <button class="toolbar-btn" onclick="formatText('bold')" title="Grassetto"><i class="bi bi-type-bold"></i></button>
            <button class="toolbar-btn" onclick="formatText('italic')" title="Corsivo"><i class="bi bi-type-italic"></i></button>
            <button class="toolbar-btn" onclick="formatText('underline')" title="Sottolineato"><i class="bi bi-type-underline"></i></button>
            <button class="toolbar-btn" onclick="formatText('formatBlock', 'blockquote')" title="Citazione"><i class="bi bi-quote"></i></button>
        </div>

        <div class="toolbar-group">
            <span class="toolbar-label">Media & Link</span>
            <button class="toolbar-btn" onclick="addLink()" title="Inserisci Link"><i class="bi bi-link-45deg"></i></button>
            <button class="toolbar-btn" onclick="addImage()" title="Inserisci Foto URL"><i class="bi bi-image"></i></button>
            <button class="toolbar-btn" onclick="addCustomButton()" title="Inserisci Pulsante"><i class="bi bi-rectangle-fill"></i></button>
            <input type="color" title="Colore Testo/Link" onchange="formatText('foreColor', this.value)" style="width:30px; height:30px; cursor:pointer;">
        </div>

        <div class="toolbar-group">
            <span class="toolbar-label">Posizione</span>
            <button class="toolbar-btn" onclick="moveCard('up')" title="Sposta Su"><i class="bi bi-arrow-up"></i></button>
            <button class="toolbar-btn" onclick="moveCard('down')" title="Sposta Giù"><i class="bi bi-arrow-down"></i></button>
        </div>

        <div class="toolbar-group">
            <span class="toolbar-label">Card Style</span>
            <input type="color" title="Colore Sfondo Card" onchange="setCardStyle('bg', this.value)" style="width:30px; height:30px; cursor:pointer;">
            <input type="color" title="Colore Barra Laterale" onchange="setCardStyle('border', this.value)" style="width:30px; height:30px; cursor:pointer;">
            <button class="toolbar-btn" onclick="toggleBorderless()" title="Senza Riquadro"><i class="bi bi-border-style"></i></button>
            <button class="toolbar-btn" onclick="toggleSize()" title="Cambia Dimensione (50/100%)"><i class="bi bi-aspect-ratio"></i></button>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn bg-success border-0" onclick="addNewCard()"><i class="bi bi-plus-lg"></i></button>
            <button class="toolbar-btn bg-danger border-0" onclick="deleteSelectedCard()"><i class="bi bi-trash"></i></button>
            <button class="toolbar-btn bg-primary border-0" id="btn-save" onclick="saveToFirebase()"><i class="bi bi-cloud-arrow-up"></i> SALVA</button>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="media/changelogoclear.png" alt="Logo" width="55" class="me-2">
                <span class="text-white">GIUSEPPE<span style="color:var(--titles-gold)">MUSUMECI</span></span>
            </a>
            <div id="user-info" style="display:none; align-items:center;">
                <span id="user-name" class="small fw-bold text-warning me-3"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div id="dynamic-content-area">
                <div class="text-center py-5" id="loading-spinner">
                    <div class="spinner-border text-warning"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            databaseURL: "https://giuseppe-4c318-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const ADMIN_EMAILS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com', 'drgiuseppemusumeci@gmail.com'];
        const OBFUSCATED_PASS = "TWFzY2FsaTE5NzEh"; 
        const TOTP_SECRET = "JBSWY3DPEHPK3PXP"; 

        let isAdminActive = false;
        let loginStep = 1;
        let activeCard = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email.toLowerCase();
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').innerText = email.split('@')[0];
                if (ADMIN_EMAILS.includes(email) && !isAdminActive) {
                    document.getElementById('password-overlay').style.display = 'flex';
                }
            }
            loadRealtimeData();
        });

        window.handleSecurityFlow = () => {
            if (loginStep === 1) {
                const pass = document.getElementById("system-password").value;
                if (btoa(pass) === OBFUSCATED_PASS) {
                    loginStep = 2;
                    document.getElementById('step-pass').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                    document.getElementById('btn-unlock-action').innerText = "SBLOCCA";
                } else { alert("Password Errata"); }
            } else if (loginStep === 2) {
                const code = document.getElementById("otp-code").value.trim();
                let totp = new OTPAuth.TOTP({ secret: TOTP_SECRET });
                if (totp.validate({ token: code, window: 1 }) !== null) {
                    unlockEditor();
                } else { alert("Codice errato o scaduto."); }
            }
        };

        function unlockEditor() {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('admin-toolbar').style.display = 'flex';
            document.body.classList.add('editor-on');
            isAdminActive = true;
            loadRealtimeData();
        }

        function loadRealtimeData() {
            db.ref('system_pages/storia_change').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('dynamic-content-area');
                container.innerHTML = '';
                if (data) {
                    Object.values(data).forEach((item, idx) => {
                        const card = document.createElement('div');
                        // Applica classi esistenti e nuova gestione dimensione
                        card.className = 'epoch-card ' + 
                                       (item.isBorderless ? 'borderless ' : '') + 
                                       (item.isHalf ? 'half-size' : '');
                        
                        card.style.backgroundColor = item.bgColor || '';
                        card.style.borderLeftColor = item.borderColor || '';
                        card.innerHTML = item.html || '';
                        
                        if (isAdminActive) {
                            card.setAttribute('contenteditable', 'true');
                            card.onclick = (e) => { 
                                activeCard = card; 
                                // Piccolo feedback visivo per selezione
                                document.querySelectorAll('.epoch-card').forEach(c => c.style.outline = "none");
                                card.style.outline = "2px solid var(--titles-gold)";
                                e.stopPropagation(); 
                            };
                        }
                        container.appendChild(card);
                    });
                }
                document.getElementById('loading-spinner')?.remove();
            });
        }

        // --- FUNZIONI TOOLBAR (ORIGINALI + NUOVE) ---
        window.formatText = (cmd, val = null) => document.execCommand(cmd, false, val);
        
        window.addLink = () => { const url = prompt("URL:"); if(url) formatText('createLink', url); };
        
        // NUOVA: Inserimento Immagine
        window.addImage = () => {
            const url = prompt("Inserisci URL Immagine:");
            if(url) formatText('insertHTML', `<img src="${url}" alt="immagine">`);
        };

        window.addCustomButton = () => {
            const url = prompt("URL:"); const text = prompt("Testo:", "SCOPRI");
            if(url && text) formatText('insertHTML', `<a href="${url}" class="card-action-btn" contenteditable="false">${text}</a>&nbsp;`);
        };

        window.setCardStyle = (type, val) => {
            if(!activeCard) return alert("Clicca su una card!");
            if(type === 'bg') activeCard.style.backgroundColor = val;
            if(type === 'border') activeCard.style.borderLeftColor = val;
        };

        window.toggleBorderless = () => { if(activeCard) activeCard.classList.toggle('borderless'); };

        // NUOVA: Toggle Dimensione 50/100
        window.toggleSize = () => {
            if(!activeCard) return alert("Seleziona una card!");
            activeCard.classList.toggle('half-size');
        };

        // NUOVA: Spostamento Blocchi
        window.moveCard = (direction) => {
            if(!activeCard) return alert("Seleziona una card!");
            const container = document.getElementById('dynamic-content-area');
            if(direction === 'up') {
                const prev = activeCard.previousElementSibling;
                if(prev) container.insertBefore(activeCard, prev);
            } else {
                const next = activeCard.nextElementSibling;
                if(next) container.insertBefore(next, activeCard);
            }
        };

        window.addNewCard = () => {
            const card = document.createElement('div');
            card.className = 'epoch-card'; card.setAttribute('contenteditable', 'true');
            card.innerHTML = "<h2>Titolo</h2><p>Contenuto...</p>";
            card.onclick = (e) => { 
                activeCard = card; 
                document.querySelectorAll('.epoch-card').forEach(c => c.style.outline = "none");
                card.style.outline = "2px solid var(--titles-gold)";
                e.stopPropagation(); 
            };
            document.getElementById('dynamic-content-area').prepend(card);
        };

        window.deleteSelectedCard = () => { if(activeCard && confirm("Eliminare?")) activeCard.remove(); };

        window.saveToFirebase = () => {
            const btn = document.getElementById('btn-save'); btn.innerText = "SALVATAGGIO...";
            const data = Array.from(document.querySelectorAll('.epoch-card')).map((card, idx) => ({
                html: card.innerHTML, 
                bgColor: card.style.backgroundColor, 
                borderColor: card.style.borderLeftColor, 
                isBorderless: card.classList.contains('borderless'),
                isHalf: card.classList.contains('half-size') // Salva lo stato della dimensione
            }));
            db.ref('system_pages/storia_change').set(data).then(() => {
                btn.innerText = "SALVATO!";
                setTimeout(() => btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> SALVA', 2000);
            });
        };

        window.closePasswordPrompt = () => document.getElementById('password-overlay').style.display = 'none';
        window.logout = () => auth.signOut().then(() => window.location.reload());
        
        document.addEventListener('click', (e) => { 
            if(!e.target.closest('.epoch-card') && !e.target.closest('#admin-toolbar')) {
                activeCard = null;
                document.querySelectorAll('.epoch-card').forEach(c => c.style.outline = "none");
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-HYME8VH6Y5"></script>

<script>
    // 2. INIZIALIZZAZIONE MOTORE ANALYTICS (Deve stare prima di tutto)
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    
    // Leggiamo subito se c'è un consenso salvato
    const initialConsent = localStorage.getItem('cookie_consent_status') === 'granted' ? 'granted' : 'denied';
    
    gtag('consent', 'default', {
        'analytics_storage': initialConsent,
        'ad_storage': initialConsent,
        'ad_user_data': initialConsent,
        'ad_personalization': initialConsent
    });
    gtag('js', new Date());
    gtag('config', 'G-HYME8VH6Y5');
</script>

<style>

    .btn-reject { background: rgba(255,255,255,0.1); color: var(--brand-text); border: 1px solid rgba(214, 220, 234, 0.2); }

    .privacy-link {
        display: inline-block;

        color: var(--brand-coral);
        font-size: 0.8rem;
        text-decoration: none;

        letter-spacing: 1px;

    .privacy-link:hover { color: var(--brand-gold); }
</style>

<button id="cookie-settings-trigger" onclick="toggleCookieBanner()">
    <i class="bi bi-gear-fill fs-5"></i>
</button>

<div id="cookie-overlay" class="cookie-overlay">
    <div class="cookie-card">
        <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--brand-coral);"></i>
        <h3>Privacy & Cookie</h3>
        <p style="font-size: 0.95rem; opacity: 0.9;">Ottimizza la tua rotta navigazionale abilitando i cookie di analisi per migliorare l'esperienza sul sito.</p>
        <div class="cookie-actions">
            <button onclick="handleConsent('granted')" class="btn-cookie btn-accept">Accetta Tutti</button>
            <button onclick="handleConsent('denied')" class="btn-cookie btn-reject">Solo Necessari</button>

<script>
    // 5. LOGICA OPERATIVA
    (function() {
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            projectId: "giuseppe-4c318",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Funzione per mostrare/nascondere
        window.toggleCookieBanner = function() {
            const overlay = document.getElementById('cookie-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        };

        // Funzione per salvare il consenso e parlare con Google
        window.handleConsent = function(status) {
            localStorage.setItem('cookie_consent_status', status);
            sessionStorage.setItem('cookie_banner_shown_session', 'true');

            // AGGIORNAMENTO REALE GA4
            gtag('consent', 'update', {
                'analytics_storage': status,
                'ad_storage': status,
                'ad_user_data': status,
                'ad_personalization': status
            });

            document.getElementById('cookie-overlay').style.display = 'none';
            console.log("Consenso GA4 inviato: " + status);
        };

        // Controllo Auth + Sessione
        auth.onAuthStateChanged((user) => {
            if (!user) {
                const alreadySet = localStorage.getItem('cookie_consent_status');
                const seenThisSession = sessionStorage.getItem('cookie_banner_shown_session');

                if (!alreadySet && !seenThisSession) {
                    setTimeout(toggleCookieBanner, 1500);
                }
            }
        });
    })();
</script>
</body>
