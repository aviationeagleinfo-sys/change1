<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storia del Change | Hub Operativo</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <!-- Bootstrap & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* === TEMA ORIGINALE === */
        :root {
            --bg-main: #395296;        
            --titles-gold: #f8c200;    
            --accent-coral: #eb966a;   
            --text-light: #d6dcea;     
            --dark-overlay: rgba(0, 0, 0, 0.2);
            --column-base: rgba(214, 220, 234, 0.1); 
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.8;
            overflow-x: hidden;
            transition: padding-top 0.3s;
        }

        h1, h2, h3, h4, h5, .widget-title {
            font-family: 'Outfit', sans-serif;
            color: var(--titles-gold);
            font-weight: 700;
        }

        /* === TOOLBAR ADMIN === */
        #admin-toolbar {
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(15, 25, 50, 0.98);
            padding: 15px 20px; z-index: 10000; 
            border-bottom: 4px solid var(--titles-gold);
            display: none; align-items: center; gap: 12px; 
            flex-wrap: wrap; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.editor-on { padding-top: 130px !important; }

        .toolbar-btn {
            background: var(--dark-overlay); color: var(--white); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .toolbar-btn:hover { background: var(--accent-coral); }

        /* === COLONNE GRECHE === */
        .greek-column {
            position: fixed; top: 0; width: 60px; height: 100vh; z-index: -1;
            background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, var(--column-base) 20%, rgba(255,255,255,0.05) 35%, var(--column-base) 50%, rgba(0,0,0,0.1) 65%, var(--column-base) 80%, rgba(0,0,0,0.1) 100%);
            background-size: 30px 100%; 
        }
        .col-left { left: 15px; } .col-right { right: 15px; }

        .epoch-card { 
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 24px; 
            border-left: 6px solid var(--accent-coral); margin-bottom: 30px; transition: all 0.3s;
        }
        .epoch-card[contenteditable="true"]:focus {
            outline: 3px solid var(--titles-gold); background: rgba(255,255,255,0.08);
        }

        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        .navbar { background: rgba(42, 61, 114, 0.95); border-bottom: 4px solid var(--accent-coral); backdrop-filter: blur(10px); }
        .brand-accent { color: var(--titles-gold); }
        .profile-header { padding: 80px 0 40px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .teal-divider { width: 60px; height: 5px; background: var(--accent-coral); margin: 25px 0; border-radius: 10px; }
        .main-footer { background-color: rgba(0,0,0,0.2); color: var(--text-light); padding: 60px 0 30px; border-top: 6px solid var(--titles-gold); }
        
        .btn-medical { 
            background-color: var(--accent-coral); 
            color: var(--white); 
            border-radius: 50px; 
            padding: 8px 20px; 
            font-weight: 700; 
            border: none;
            transition: 0.3s;
        }
        .btn-medical:hover { background-color: var(--titles-gold); color: var(--bg-main); }
    </style>
</head>
<body>

    <div class="greek-column col-left"></div>
    <div class="greek-column col-right"></div>

    <!-- Password Overlay -->
    <div id="password-overlay">
        <div class="login-box text-center bg-dark p-5 rounded-4 border border-warning shadow-lg">
            <h4 class="mb-4 text-warning">Verifica Sicurezza Admin</h4>
            <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password...">
            <button onclick="unlockEditor()" class="btn btn-warning w-100 fw-bold">SBLOCCA EDITOR</button>
            <button onclick="closePasswordPrompt()" class="btn btn-link text-white btn-sm mt-2">Sola Lettura</button>
        </div>
    </div>

    <!-- Toolbar Editor -->
    <div id="admin-toolbar">
        <button class="toolbar-btn" onclick="formatText('bold')"><b>B</b></button>
        <button class="toolbar-btn" onclick="formatText('italic')"><i>I</i></button>
        <div class="d-flex align-items-center gap-2 mx-3">
            <label class="small">Sfondo:</label>
            <input type="color" onchange="updateCardStyle('background', this.value)">
        </div>
        <button class="toolbar-btn bg-success border-0" onclick="addNewCard()"><i class="bi bi-plus-circle"></i> AGGIUNGI</button>
        <button class="toolbar-btn bg-danger border-0" onclick="deleteSelectedCard()"><i class="bi bi-trash"></i></button>
        <button class="toolbar-btn bg-primary border-0" id="btn-save" onclick="saveToFirebase()">SALVA RTDB</button>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="https://www.drgiuseppemusumeci.com/index.html">
                <img src="media/changelogoclear.png" alt="Logo" width="55" class="me-2">
                <span>GIUSEPPE<span class="brand-accent">MUSUMECI</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <i class="bi bi-list fs-1 text-white"></i> 
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-lg-2"><a class="nav-link fw-bold text-uppercase text-white" href="https://www.drgiuseppemusumeci.com/index.html">Home</a></li>
                    <li class="nav-item">
                        <!-- PULSANTE ACCESSO HUB RIPRISTINATO -->
                        <a href="login.html" id="btn-login-nav" class="btn btn-medical btn-sm">ACCESSO HUB</a>
                        <div id="user-info" style="display:none; align-items:center; gap:15px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 50px;">
                            <span id="user-name" class="small fw-bold text-warning text-uppercase"></span>
                            <button onclick="logout()" class="btn btn-outline-light btn-sm rounded-pill" style="font-size: 0.7rem;">LOGOUT</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="profile-header">
        <div class="container text-center text-lg-start">
            <h6 class="text-uppercase fw-bold opacity-75 small mb-2" style="color: var(--accent-coral); letter-spacing: 2px;">Change in Cardiology</h6>
            <h1 class="display-4 fw-bold">Hub Operativo: La Storia</h1>
            <div class="teal-divider mx-auto mx-lg-0"></div>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row g-lg-5">
                <div class="col-lg-8" id="dynamic-content-area">
                    <div class="text-center py-5" id="loading-spinner">
                        <div class="spinner-border text-warning"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container text-center text-lg-start">
            <div class="footer-logo mb-3 fw-bold fs-4">GIUSEPPE<span class="brand-accent">MUSUMECI</span></div>
            <p class="opacity-50 small">&copy; 2026 MD Giuseppe Musumeci. Tutti i diritti riservati ove non esplicato altra licenza.</p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // CONFIGURAZIONE 1: AUTH (Progetto Vecchio)
        const authConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            databaseURL: "https://giuseppe-4c318-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };

        // CONFIGURAZIONE 2: DATABASE (Progetto Nuovo)
        const dbConfig = {
            apiKey: "AIzaSyDB858lvuIi93dYBUmviH87jrb8dHZxm1s",
            authDomain: "giuseppe-rtdb.firebaseapp.com",
            projectId: "giuseppe-rtdb",
            storageBucket: "giuseppe-rtdb.firebasestorage.app",
            messagingSenderId: "409034640682",
            appId: "1:409034640682:web:b183a9b69b4b51e5e8e253",
            databaseURL: "https://giuseppe-rtdb-default-rtdb.firebaseio.com"
        };

        // Inizializzazione Doppia App
        const authApp = firebase.initializeApp(authConfig, "authApp");
        const dbApp = firebase.initializeApp(dbConfig, "dbApp");

        const auth = authApp.auth();
        const db = dbApp.database();

        const ADMIN_EMAILS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com'];
        const OBFUSCATED_PASS = "TWFzY2FsaTE5NzEh"; 
        let isAdminActive = false;
        let activeCard = null;

        // Gestione Accesso (Usa il vecchio progetto)
        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email.toLowerCase();
                document.getElementById('btn-login-nav').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').innerText = email;
                if (ADMIN_EMAILS.includes(email)) {
                    document.getElementById('password-overlay').style.display = 'flex';
                }
            } else {
                document.getElementById('btn-login-nav').style.display = 'inline-block';
                document.getElementById('user-info').style.display = 'none';
            }
            loadRealtimeData();
        });

        // Caricamento Dati (Usa il nuovo progetto)
        function loadRealtimeData() {
            db.ref('system_pages/storia_change').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('dynamic-content-area');
                container.innerHTML = '';
                
                if (data) {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'epoch-card';
                        card.style.backgroundColor = item.bgColor || '';
                        card.style.borderLeftColor = item.borderColor || '';
                        card.innerHTML = item.html;
                        if (isAdminActive) {
                            card.setAttribute('contenteditable', 'true');
                            card.onclick = (e) => { e.stopPropagation(); activeCard = card; };
                        }
                        container.appendChild(card);
                    });
                }
            });
        }

        window.unlockEditor = () => {
            const pass = document.getElementById("system-password").value;
            if (btoa(pass) === OBFUSCATED_PASS) {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('admin-toolbar').style.display = 'flex';
                document.body.classList.add('editor-on');
                isAdminActive = true;
                loadRealtimeData();
            } else { alert("Password Errata"); }
        };

        window.saveToFirebase = () => {
            const btn = document.getElementById('btn-save');
            btn.innerText = "Salvataggio...";
            const data = Array.from(document.querySelectorAll('.epoch-card')).map((card, idx) => ({
                id: idx,
                html: card.innerHTML,
                bgColor: card.style.backgroundColor,
                borderColor: card.style.borderLeftColor
            }));
            db.ref('system_pages/storia_change').set(data).then(() => {
                btn.innerText = "SALVATO!";
                setTimeout(() => btn.innerText = "SALVA RTDB", 2000);
            });
        };

        window.addNewCard = () => {
            const container = document.getElementById('dynamic-content-area');
            const card = document.createElement('div');
            card.className = 'epoch-card';
            card.setAttribute('contenteditable', 'true');
            card.innerHTML = "<h2>Nuova Epoca</h2><p>Descrizione qui...</p>";
            card.onclick = (e) => { e.stopPropagation(); activeCard = card; };
            container.prepend(card);
        };

        window.deleteSelectedCard = () => { if(activeCard) activeCard.remove(); };
        window.formatText = (cmd) => document.execCommand(cmd, false, null);
        window.updateCardStyle = (prop, val) => { if(activeCard) activeCard.style[prop] = val; };
        window.closePasswordPrompt = () => document.getElementById('password-overlay').style.display = 'none';
        window.logout = () => auth.signOut().then(() => window.location.reload());
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
