<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storia del Change | Hub Operativo</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <!-- Bootstrap & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* === PALETTE CROMATICA === */
        :root {
            --bg-main: #395296;        
            --titles-gold: #f8c200;    
            --accent-coral: #eb966a;   
            --text-light: #d6dcea;     
            
            --dark-overlay: rgba(0, 0, 0, 0.2);
            --column-base: rgba(214, 220, 234, 0.1); 
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.8;
            overflow-x: hidden;
            transition: padding-top 0.3s;
        }

        h1, h2, h3, h4, h5, .widget-title {
            font-family: 'Outfit', sans-serif;
            color: var(--titles-gold);
            font-weight: 700;
        }

        /* === TOOLBAR ADMIN OTTIMIZZATA (ALTA E MOBILE READY) === */
        #admin-toolbar {
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(15, 25, 50, 0.98);
            padding: 15px 20px; z-index: 10000; 
            border-bottom: 4px solid var(--titles-gold);
            display: none; align-items: center; gap: 12px; 
            flex-wrap: wrap; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Padding dinamico quando l'editor è attivo */
        body.editor-on { padding-top: 130px !important; }
        @media (max-width: 991px) { body.editor-on { padding-top: 200px !important; } }

        .toolbar-btn {
            background: var(--dark-overlay); color: var(--white); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px;
        }
        .toolbar-btn:hover { background: var(--accent-coral); border-color: var(--white); }
        .btn-delete { background: #dc3545 !important; border-color: #dc3545 !important; }
        .btn-delete:hover { background: #ff0000 !important; }

        /* === COLONNE GRECHE === */
        .greek-column {
            position: fixed; top: 0; width: 60px; height: 100vh; z-index: -1;
            background: linear-gradient(90deg, 
                rgba(0,0,0,0.1) 0%, 
                var(--column-base) 20%, 
                rgba(255,255,255,0.05) 35%, 
                var(--column-base) 50%, 
                rgba(0,0,0,0.1) 65%, 
                var(--column-base) 80%, 
                rgba(0,0,0,0.1) 100%);
            background-size: 30px 100%; 
            border-left: 1px solid rgba(255,255,255,0.05); 
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .col-left { left: 15px; } 
        .col-right { right: 15px; }

        /* === NAVBAR === */
        .navbar { 
            background: rgba(42, 61, 114, 0.95); 
            border-bottom: 4px solid var(--accent-coral); 
            padding: 1rem 0; 
            backdrop-filter: blur(10px);
        }

        /* === CARDS (RIQUADRI) === */
        .epoch-card { 
            background: rgba(255,255,255,0.03); 
            padding: 30px; 
            border-radius: 24px; 
            border-left: 6px solid var(--accent-coral);
            margin-bottom: 30px; 
            transition: all 0.3s;
        }
        .epoch-card[contenteditable="true"]:focus {
            outline: 3px solid var(--titles-gold); 
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(248, 194, 0, 0.3);
        }

        .btn-medical-custom { 
            background-color: var(--accent-coral); color: var(--white); 
            border-radius: 50px; padding: 12px 35px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1.5px; border: none; 
            display: inline-flex; text-decoration: none; margin-top: 15px;
        }

        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        .main-footer { 
            background-color: rgba(0,0,0,0.2); color: var(--text-light); 
            padding: 60px 0 30px; border-top: 6px solid var(--titles-gold); 
        }
    </style>
</head>
<body>

    <div class="greek-column col-left"></div>
    <div class="greek-column col-right"></div>

    <!-- Password Overlay -->
    <div id="password-overlay">
        <div class="login-box text-center bg-dark p-5 rounded-4 border border-warning shadow-lg">
            <h4 class="mb-4 text-warning">Verifica Sicurezza Admin</h4>
            <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password...">
            <button onclick="unlockEditor()" class="btn btn-warning w-100 fw-bold">SBLOCCA EDITOR</button>
            <button onclick="closePasswordPrompt()" class="btn btn-link text-white btn-sm mt-2 opacity-50">Sola Lettura</button>
        </div>
    </div>

    <!-- Toolbar Editor (Alta e Spaziata) -->
    <div id="admin-toolbar">
        <div class="d-flex gap-2 me-lg-4 border-end border-secondary pe-3">
            <button class="toolbar-btn" onclick="formatText('bold')"><i class="bi bi-type-bold"></i></button>
            <button class="toolbar-btn" onclick="formatText('italic')"><i class="bi bi-type-italic"></i></button>
            <button class="toolbar-btn" onclick="insertLink()"><i class="bi bi-link"></i> Link</button>
        </div>
        
        <div class="d-flex align-items-center gap-3 me-lg-4">
            <div class="d-flex align-items-center gap-1">
                <label class="small">Sfondo:</label>
                <input type="color" id="bg-color-picker" onchange="updateCardStyle('background', this.value)">
            </div>
            <div class="d-flex align-items-center gap-1">
                <label class="small">Bordo:</label>
                <input type="color" id="border-color-picker" onchange="updateCardStyle('borderColor', this.value)">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="toolbar-btn bg-success border-success" onclick="addNewCard()"><i class="bi bi-plus-circle"></i> AGGIUNGI</button>
            <button class="toolbar-btn btn-delete" onclick="deleteSelectedCard()"><i class="bi bi-trash"></i> ELIMINA</button>
            <button class="toolbar-btn bg-primary border-primary" onclick="saveToFirebase()"><i class="bi bi-cloud-arrow-up"></i> SALVA RTDB</button>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="media/changelogoclear.png" alt="Logo" width="55" class="me-2">
                <span>GIUSEPPE<span class="brand-accent">MUSUMECI</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <i class="bi bi-list fs-1"></i> 
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-lg-2"><a class="nav-link fw-bold" href="#">Dashboard</a></li>
                    <li class="nav-item">
                        <a href="login.html" id="btn-login-nav" class="btn btn-medical btn-sm">ACCESSO HUB</a>
                        <div id="user-info" style="display:none; align-items:center; gap:10px;">
                            <span id="user-name" class="small fw-bold text-warning"></span>
                            <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="profile-header mt-4">
        <div class="container text-center text-lg-start">
            <h6 class="text-uppercase fw-bold opacity-75 small mb-2" style="color: var(--accent-coral); letter-spacing: 2px;">Change in Cardiology</h6>
            <h1 class="display-4 fw-bold">Hub Operativo: La Storia</h1>
        </div>
    </header>

    <main class="main-wrapper py-5">
        <div class="container">
            <div class="row g-lg-5">
                <div class="col-lg-8 content-section" id="dynamic-content-area">
                    <div class="text-center py-5" id="loading-spinner">
                        <div class="spinner-border text-warning" role="status"></div>
                    </div>
                </div>

                <div class="col-lg-4 sidebar">
                    <div class="sidebar-widget bg-dark bg-opacity-25 p-4 rounded-4 border border-light border-opacity-10">
                        <h5 class="widget-title mb-4">Parametri di Missione</h5>
                        <ul class="list-unstyled mb-0">
                            <li class="bg-dark bg-opacity-50 p-3 rounded-3 mb-3 border-start border-4 border-info">
                                <i class="bi bi-activity text-info me-2"></i> Hub Mauriziano: <strong>FULL OPS</strong>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container text-center">
            <div class="mb-3 fw-bold fs-4">GIUSEPPE<span class="brand-accent">MUSUMECI</span></div>
            <p class="opacity-50 small">&copy; 2026 MD Giuseppe Musumeci. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
  authDomain: "giuseppe-4c318.firebaseapp.com",
  databaseURL: "https://giuseppe-4c318-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "giuseppe-4c318",
  storageBucket: "giuseppe-4c318.firebasestorage.app",
  messagingSenderId: "658885311131",
  appId: "1:658885311131:web:9bb26a19cec41dd331e43e",
  measurementId: "G-T740SVWJ06"
};
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const ADMIN_EMAILS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com'];
        const OBFUSCATED_PASS = "TWFzY2FsaTE5NzEh"; 
        
        let isAdminActive = false;
        let activeCard = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email.toLowerCase();
                document.getElementById('btn-login-nav').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').innerText = email;
                if (ADMIN_EMAILS.includes(email)) {
                    document.getElementById('password-overlay').style.display = 'flex';
                }
            }
            loadDataFromRTDB();
        });

        window.unlockEditor = function() {
            const passInput = document.getElementById("system-password").value;
            if (btoa(passInput) === OBFUSCATED_PASS) {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('admin-toolbar').style.display = 'flex';
                document.body.classList.add('editor-on');
                isAdminActive = true;
                refreshEditableCards();
            } else { alert("Password errata."); }
        };

        function refreshEditableCards() {
            document.querySelectorAll('.epoch-card').forEach(card => {
                card.setAttribute('contenteditable', 'true');
                card.addEventListener('focus', () => activeCard = card);
            });
        }

        window.deleteSelectedCard = function() {
            if (!activeCard) return alert("Seleziona un riquadro prima di eliminarlo.");
            if (confirm("Eliminare definitivamente questo modulo?")) {
                activeCard.remove();
                activeCard = null;
            }
        };

        window.loadDataFromRTDB = function() {
            db.ref('system_pages/storia_change').once('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('dynamic-content-area');
                container.innerHTML = ''; 
                if (data && data.length > 0) {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'epoch-card';
                        card.style.backgroundColor = item.bgColor || 'rgba(255,255,255,0.03)';
                        card.style.borderLeftColor = item.borderColor || '#eb966a';
                        card.innerHTML = item.html;
                        container.appendChild(card);
                    });
                    if (isAdminActive) refreshEditableCards();
                } else {
                    container.innerHTML = `<div class="epoch-card"><h2>Benvenuto</h2><p>Inizia ad aggiungere contenuti.</p></div>`;
                }
            });
        };

        window.formatText = (command) => document.execCommand(command, false, null);

        window.updateCardStyle = (property, value) => {
            if (!activeCard) return;
            if (property === 'background') activeCard.style.backgroundColor = value;
            if (property === 'borderColor') activeCard.style.borderLeftColor = value;
        };

        window.insertLink = () => {
            const url = prompt("URL:");
            const text = prompt("Testo:");
            if (url && text) {
                const btnHtml = `<a href="${url}" class="btn-medical-custom" contenteditable="false">${text}</a><br><br>`;
                document.execCommand("insertHTML", false, btnHtml);
            }
        };

        window.addNewCard = function() {
            const container = document.getElementById('dynamic-content-area');
            const newCard = document.createElement('div');
            newCard.className = 'epoch-card';
            newCard.setAttribute('contenteditable', 'true');
            newCard.innerHTML = `<h2>Nuovo Titolo</h2><p>Contenuto...</p>`;
            newCard.addEventListener('focus', () => activeCard = newCard);
            container.prepend(newCard);
            newCard.focus();
        };

        window.saveToFirebase = function() {
            const btn = event.currentTarget;
            btn.innerHTML = 'Salvataggio...';
            const dataToSave = Array.from(document.querySelectorAll('.epoch-card')).map((card, idx) => ({
                id: idx,
                html: card.innerHTML,
                bgColor: card.style.backgroundColor,
                borderColor: card.style.borderLeftColor
            }));

            db.ref('system_pages/storia_change').set(dataToSave)
                .then(() => {
                    btn.innerHTML = 'SALVATO';
                    setTimeout(() => btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> SALVA RTDB', 2000);
                });
        };

        window.closePasswordPrompt = () => document.getElementById('password-overlay').style.display = 'none';
        window.logout = () => auth.signOut().then(() => window.location.reload());
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
