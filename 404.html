<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Percorso non trovato | Dr. Giuseppe Musumeci</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --cic-blue: #002D57;
            --cic-teal: #00A99D;
            --soft-gray: #f4f7f9;
            --footer-bg: #001a33;
            --column-color: rgba(0, 169, 157, 0.05);
        }

        body { 
            background-color: #ffffff; 
            color: var(--cic-blue); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- UI ELEMENTS --- */
        .greek-column {
            position: fixed; top: 0; width: 60px; height: 100vh;
            background: repeating-linear-gradient(90deg, var(--column-color), var(--column-color) 2px, transparent 2px, transparent 10px);
            z-index: -1;
        }
        .col-left { left: 15px; border-right: 1px solid var(--column-color); }
        .col-right { right: 15px; border-left: 1px solid var(--column-color); }

        /* NAVBAR */
        .navbar { background: white; border-bottom: 4px solid var(--cic-teal); padding: 1rem 0; }
        .navbar-brand { font-family: 'Outfit', sans-serif; font-weight: 600; color: var(--cic-blue)!important; }
        .brand-accent { color: var(--cic-teal); }
        .nav-link { color: var(--cic-blue)!important; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; }
        
        .btn-medical { background-color: var(--cic-blue); color: white; border-radius: 50px; padding: 10px 25px; font-weight: 600; text-decoration: none; transition: 0.3s; border: none; }
        .btn-medical:hover { background-color: var(--cic-teal); color: white; transform: translateY(-2px); }

        /* ERROR SECTION */
        .error-section { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 0; 
        }
        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            color: var(--cic-blue);
            margin-bottom: 0;
        }
        .error-code span { color: var(--cic-teal); }
        .teal-line { width: 80px; height: 4px; background: var(--cic-teal); margin: 20px auto; }
        
        /* FOOTER */
        .main-footer { background: var(--footer-bg); color: white; padding: 60px 0 30px 0; margin-top: auto; border-top: 5px solid var(--cic-teal); }
        .footer-link { color: #b0b8c1; text-decoration: none; transition: 0.2s; font-size: 0.95rem; }
        .footer-link:hover { color: var(--cic-teal); padding-left: 5px; }

        #user-info { display: none; align-items: center; }
    </style>
</head>
<body>

    <div class="greek-column col-left"></div>
    <div class="greek-column col-right"></div>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="https://www.drgiuseppemusumeci.com">
                <i class="bi bi-heart-pulse-fill me-2" style="color: var(--cic-teal); font-size: 2rem;"></i>
                <span>GIUSEPPE<span class="brand-accent">MUSUMECI</span></span>
            </a>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-lg-2">
                        <a class="nav-link fw-bold text-uppercase" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="login.html" class="btn btn-medical btn-sm">ACCESSO HUB</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="error-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <h1 class="error-code">4<span>0</span>4</h1>
                    <h2 class="fw-bold text-uppercase" style="letter-spacing: 2px;">Percorso non trovato</h2>
                    <div class="teal-line"></div>
                    <p class="lead text-muted mb-5">
                        Spiacenti, la risorsa clinica o la pagina che stai cercando è stata spostata <br class="d-none d-md-block"> 
                        o non è presente nel database attuale.
                    </p>
                    <a href="index.html" class="btn-medical px-5 py-3">
                        <i class="bi bi-arrow-left me-2"></i> RITORNA ALLA HOME
                    </a>
                </div>
            </div>
        </div>
    </main>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
