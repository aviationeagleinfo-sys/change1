<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Percorso non trovato | Dr. Giuseppe Musumeci</title>
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* === PALETTE CROMATICA RICALIBRATA === */
        :root {
            --bg-main: #395296;        /* Deep Sea Blue */
            --titles-gold: #f8c200;    /* Gold Aviation */
            --accent-coral: #eb966a;   /* Coral Accent */
            --text-light: #d6dcea;     /* Soft Cloud */
            --dark-panel: #2a3d72;     /* Pannello di navigazione */
            --column-color: rgba(248, 194, 0, 0.05); /* Colonne in oro trasparente */
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- UI ELEMENTS --- */
        .greek-column {
            position: fixed; top: 0; width: 60px; height: 100vh;
            background: repeating-linear-gradient(90deg, var(--column-color), var(--column-color) 2px, transparent 2px, transparent 10px);
            z-index: -1;
        }
        .col-left { left: 15px; border-right: 1px solid var(--column-color); }
        .col-right { right: 15px; border-left: 1px solid var(--column-color); }

        /* NAVBAR */
        .navbar { background: var(--dark-panel); border-bottom: 4px solid var(--accent-coral); padding: 1rem 0; }
        .navbar-brand { font-family: 'Outfit', sans-serif; font-weight: 600; color: var(--titles-gold)!important; }
        .brand-accent { color: var(--white); }
        .nav-link { color: var(--text-light)!important; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; }
        
        .btn-medical { 
            background-color: var(--accent-coral); 
            color: white; 
            border-radius: 50px; 
            padding: 10px 25px; 
            font-weight: 800; 
            text-decoration: none; 
            transition: 0.3s; 
            border: none;
            text-transform: uppercase;
        }
        .btn-medical:hover { background-color: var(--titles-gold); color: var(--bg-main); transform: translateY(-2px); }

        /* ERROR SECTION */
        .error-section { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 0; 
        }
        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 10rem;
            font-weight: 700;
            line-height: 0.8;
            color: var(--titles-gold);
            margin-bottom: 15px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .error-code span { color: var(--accent-coral); }
        .gold-line { width: 80px; height: 4px; background: var(--titles-gold); margin: 20px auto; border-radius: 2px; }
        
        .error-text { letter-spacing: 3px; color: var(--white); font-weight: 700; }
        .lead { color: var(--text-light); opacity: 0.8; }

        #user-info { display: none; align-items: center; }
    </style>
</head>
<body>

    <div class="greek-column col-left"></div>
    <div class="greek-column col-right"></div>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-heart-pulse-fill me-2" style="color: var(--accent-coral); font-size: 2rem;"></i>
                <span>GIUSEPPE<span style="color:white">MUSUMECI</span></span>
            </a>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-lg-2">
                        <a class="nav-link fw-bold text-uppercase" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="login.html" class="btn btn-medical btn-sm">ACCESSO HUB</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="error-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <h1 class="error-code">4<span>0</span>4</h1>
                    <h2 class="error-text text-uppercase">Rotta non trovata</h2>
                    <div class="gold-line"></div>
                    <p class="lead mb-5">
                        Spiacenti, i sensori non rilevano la pagina o il file richiesto. <br class="d-none d-md-block"> 
                        Potrebbe essere stato rimosso dal database o spostato in un altro settore.
                    </p>
                    <a href="index.html" class="btn-medical px-5 py-3">
                        <i class="bi bi-rocket-takeoff me-2"></i> RITORNA ALLA HOME
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
