<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Hub | Dr. Giuseppe Musumeci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --cic-blue: #002D57; --cic-teal: #00A99D; }
        body { background: var(--cic-blue); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 420px; }
        
        .btn-teal { background: var(--cic-teal); color: white; border-radius: 50px; font-weight: bold; width: 100%; padding: 12px; border: none; transition: 0.3s; }
        .btn-teal:hover { background: #008f85; transform: translateY(-2px); }
        .btn-teal:disabled { background: #a5d6d2; cursor: not-allowed; }

        .btn-social { border-radius: 50px; padding: 10px; font-weight: 600; font-size: 0.9rem; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-google { border: 1px solid #dadce0; background: white; color: #3c4043; }
        .btn-facebook { background: #1877F2; color: white; border: none; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-1px); }

        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #ccc; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider span { padding: 0 10px; font-size: 0.8rem; text-transform: uppercase; color: #aaa; font-weight: bold;}
        
        .form-label { font-size: 0.75rem; font-weight: 700; color: var(--cic-blue); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border-radius: 8px; }
        .forgot-link { font-size: 0.75rem; text-decoration: none; color: #666; transition: 0.2s; cursor: pointer;}
        .forgot-link:hover { color: var(--cic-teal); }
    </style>
</head>
<body>

    <div class="login-box text-center">
        <h3 class="fw-bold mb-2" style="color: var(--cic-blue);">ACCESSO HUB</h3>
        <p class="text-muted small mb-4">Credenziali operative sottodominio CHANGE</p>
        
        <button onclick="loginSocial('google')" class="btn btn-social btn-google">
            <i class="bi bi-google me-2"></i> Accedi con Google
        </button>
        <button onclick="loginSocial('facebook')" class="btn btn-social btn-facebook">
            <i class="bi bi-facebook me-2"></i> Accedi con Facebook
        </button>

        <div class="divider"><span>oppure via email</span></div>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" id="email-field" class="form-control" placeholder="medico@esempio.it" required>
            </div>
            <div class="mb-2 text-start">
                <label class="form-label">Password</label>
                <input type="password" id="pass-field" class="form-control" required>
            </div>
            <div class="text-end mb-3">
                <a id="forgot-password-trigger" class="forgot-link italic">Password dimenticata?</a>
            </div>
            
            <button type="submit" id="loginBtn" class="btn btn-teal mb-3">ENTRA NEL SISTEMA</button>
        </form>
        
        <div id="error-msg" class="text-danger mb-3 small" style="display:none;"></div>
        
        <div class="mt-2 border-top pt-3">
            <p class="small text-muted">Non hai un account? 
                <a href="register.html" class="text-decoration-none fw-bold" style="color: var(--cic-teal);">Registrati qui</a>
            </p>
            <a href="index.html" class="text-decoration-none small text-secondary"><i class="bi bi-arrow-left"></i> Torna alla Home</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
        authDomain: "drgiuseppemusumeci.com",
        projectId: "giuseppe-4c318",
        storageBucket: "giuseppe-4c318.firebasestorage.app",
        messagingSenderId: "658885311131",
        appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();

    // --- PROTOCOLLO DI SALVATAGGIO DATI E NAVIGAZIONE ---
    function saveAndRedirect(user) {
        // Estraiamo il nome o usiamo l'email come fallback
        const userData = {
            isLoggedIn: true,
            name: user.displayName || user.email.split('@')[0].toUpperCase(),
            email: user.email,
            uid: user.uid
        };
        
        // Salvataggio nel localStorage affinché la Home possa leggerlo
        localStorage.setItem("user", JSON.stringify(userData));

        // Gestione redirect
        const params = new URLSearchParams(window.location.search);
        const destination = params.get('redirect');
        window.location.href = destination ? decodeURIComponent(destination) : "index.html";
    }

    // --- LOGICA PASSWORD DIMENTICATA ---
    document.getElementById('forgot-password-trigger').onclick = () => {
        const email = document.getElementById('email-field').value;
        if (!email) {
            alert("Inserisci la tua email nel campo sopra per ricevere il link di ripristino.");
            return;
        }
        auth.sendPasswordResetEmail(email)
            .then(() => alert("Protocollo di ripristino inviato! Controlla la tua casella email."))
            .catch((error) => alert("Errore: " + error.message));
    };

    // Login Email/Password
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('email-field').value;
        const pass = document.getElementById('pass-field').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error-msg');

        btn.disabled = true;
        btn.innerText = "VERIFICA IN CORSO...";
        errorDiv.style.display = 'none';

        auth.signInWithEmailAndPassword(email, pass)
            .then((result) => { 
                saveAndRedirect(result.user); 
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerText = "ENTRA NEL SISTEMA";
                errorDiv.innerText = "Errore di accesso: credenziali non valide.";
                errorDiv.style.display = 'block';
            });
    };

    // Login Social (Corretto nome funzione)
    function loginSocial(providerName) {
        let provider = (providerName === 'google') ? 
            new firebase.auth.GoogleAuthProvider() : 
            new firebase.auth.FacebookAuthProvider();

        auth.signInWithPopup(provider)
            .then((result) => { 
                saveAndRedirect(result.user); 
            })
            .catch(err => alert("Errore Social: " + err.message));
    }

    // Check se l'utente è già loggato all'apertura della pagina
    auth.onAuthStateChanged((user) => {
        if (user) {
            // Se Firebase ha già una sessione attiva, sincronizza localStorage e vai alla home
            const userData = {
                isLoggedIn: true,
                name: user.displayName || user.email.split('@')[0].toUpperCase(),
                email: user.email
            };
            localStorage.setItem("user", JSON.stringify(userData));
        }
    });
</script>
</body>
</html>
