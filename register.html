<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Hub | Dr. Giuseppe Musumeci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --cic-blue: #002D57; --cic-teal: #00A99D; }
        body { background: var(--cic-blue); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; padding: 20px; }
        .register-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 500px; }
        .btn-teal { background: var(--cic-teal); color: white; border-radius: 50px; font-weight: bold; width: 100%; padding: 12px; border: none; transition: 0.3s; }
        .btn-teal:disabled { background: #a5d6d2; cursor: not-allowed; }
        
        /* Social Buttons */
        .btn-social { border-radius: 50px; padding: 10px; font-weight: 600; font-size: 0.9rem; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-google { border: 1px solid #dadce0; background: white; color: #3c4043; }
        .btn-facebook { background: #1877F2; color: white; border: none; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-1px); }

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #ccc; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider span { padding: 0 10px; font-size: 0.75rem; text-transform: uppercase; color: #999; font-weight: bold; }

        .form-label { font-size: 0.75rem; font-weight: 700; color: var(--cic-blue); text-transform: uppercase; letter-spacing: 0.5px; }
        .pass-hint { font-size: 0.7rem; color: #666; margin-top: 5px; }
        .is-invalid { border-color: #dc3545!important; }
        .is-valid { border-color: #198754!important; }
    </style>
</head>
<body>

    <div class="register-box">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: var(--cic-blue);">REGISTRATI</h3>
            <p class="text-muted small">Registrazione sicura per il sito dedicato al CHANGE</p>
        </div>

        <div class="mb-2">
            <button onclick="loginSocial('google')" class="btn btn-social btn-google">
                <i class="bi bi-google me-2"></i> Registrati con Google
            </button>
            <button onclick="loginSocial('facebook')" class="btn btn-social btn-facebook">
                <i class="bi bi-facebook me-2"></i> Registrati con Facebook
            </button>
        </div>

        <div class="divider"><span>Oppure inserisci i dati</span></div>

        <div class="row g-3">
            <div class="col-md-6 text-start">
                <label class="form-label">Nome</label>
                <input type="text" id="reg-name" class="form-control" placeholder="Nome">
            </div>
            <div class="col-md-6 text-start">
                <label class="form-label">Cognome</label>
                <input type="text" id="reg-surname" class="form-control" placeholder="Cognome">
            </div>
            <div class="col-12 text-start">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" class="form-control" placeholder="medico@esempio.it">
            </div>
            <div class="col-md-6 text-start">
                <label class="form-label">Password</label>
                <input type="password" id="reg-password" class="form-control" oninput="validatePassword()">
                <div class="pass-hint" id="hint-req">Min. 8 caratteri e 1 numero</div>
            </div>
            <div class="col-md-6 text-start">
                <label class="form-label">Conferma Password</label>
                <input type="password" id="reg-confirm" class="form-control" oninput="validatePassword()">
            </div>
        </div>
        
        <div id="error-msg" class="text-danger mt-3 small text-center" style="display:none;"></div>
        
        <button onclick="handleRegister()" id="regBtn" class="btn btn-teal mt-4 mb-3" disabled>CREA ACCOUNT</button>
        
        <div class="text-center">
            <p class="small text-muted">Hai già un account? <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--cic-teal);">Accedi</a></p>
            <a href="index.html" class="text-decoration-none small text-secondary">Torna alla Home</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "drgiuseppemusumeci.com",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // VALIDAZIONE REAL-TIME
        function validatePassword() {
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const btn = document.getElementById('regBtn');
            const hint = document.getElementById('hint-req');

            const schema = /^(?=.*[0-9]).{8,}$/;
            const isValidSchema = schema.test(pass);
            const isMatching = pass === confirm && pass !== "";

            hint.style.color = isValidSchema ? "#198754" : "#dc3545";
            document.getElementById('reg-confirm').classList.toggle('is-valid', isMatching);
            document.getElementById('reg-confirm').classList.toggle('is-invalid', !isMatching && confirm !== "");

            btn.disabled = !(isValidSchema && isMatching);
        }

        // REGISTRAZIONE EMAIL
        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const surname = document.getElementById('reg-surname').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('regBtn');
            const errorDiv = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerText = "Sincronizzazione...";

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({
                        displayName: name + " " + surname
                    });
                })
                .then(() => window.location.href = 'index.html')
                .catch((error) => {
                    btn.disabled = false;
                    btn.innerText = "CREA ACCOUNT";
                    errorDiv.innerText = error.message;
                    errorDiv.style.display = 'block';
                });
        }

        // REGISTRAZIONE / LOGIN SOCIAL
        function loginSocial(providerName) {
            let provider;
            if (providerName === 'google') {
                provider = new firebase.auth.GoogleAuthProvider();
            } else {
                provider = new firebase.auth.FacebookAuthProvider();
            }

            auth.signInWithPopup(provider)
                .then(() => window.location.href = 'index.html')
                .catch((error) => {
                    alert("Errore Social: " + error.message);
                });
        }
    </script>
</body>
</html>
